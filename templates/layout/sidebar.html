<div class="sidebar">

        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title">MemoMeet</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-md-flex flex-column p-0 pt-lg-2 overflow-y-auto">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('dashboard.index') }}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('participants.list_participants') }}">
                        <i class="bi bi-people"></i> Participants
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('meetings.list_meetings') }}">
                        <i class="bi bi-calendar-event"></i> Meetings
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('memories.list_memories') }}">
                        <i class="bi bi-cpu"></i> Memories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('action_items.list_action_items') }}">
                        <i class="bi bi-check2-square"></i> Action Items
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('chatbot.chat_page') }}">
                        <i class="bi bi-chat-dots"></i> Memo Chat
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('analytics.index') }}">
                        <i class="bi bi-graph-up"></i> Analytics
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('recommendations.list_recommendations') }}">
                        <i class="bi bi-journal-check"></i> Meeting Prep
                    </a>
                </li>

                            <i class="bi bi-bell"></i> Notifications
                        </div>
                        {% if unread_notifications_count > 0 %}
                            <span class="badge rounded-pill bg-danger">{{ unread_notifications_count }}</span>
                        {% endif %}
                    </a>
                </li>
            </ul>
            <hr class="my-3">
            <ul class="nav flex-column mb-auto">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{{ url_for('settings.index') }}">
                        <i class="bi bi-gear"></i> Settings
                    </a>

            </ul>
