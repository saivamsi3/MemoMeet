{% extends "layout/base.html" %}
{% block title %}Preferences{% endblock %}
{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('dashboard.index') }}">Home</a></li>
<li class="breadcrumb-item"><a href="{{ url_for('settings.index') }}">Settings</a></li>
<li class="breadcrumb-item active">Preferences</li>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Preferences</h1>
</div>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Theme</label>
                        <select name="theme" class="form-select">
                            <option value="light" {% if current_user.theme == 'light' %}selected{% endif %}>Light</option>
                            <option value="dark" {% if current_user.theme == 'dark' %}selected{% endif %}>Dark</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Preferences</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
