{% extends "layout/base.html" %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
{% endblock %}

{% block auth_content %}
<div class="auth-page">
    <div class="auth-card card">
        <div class="text-center mb-4">
            <h1 class="auth-logo mb-2">
                <i class="bi bi-journal-text text-primary"></i>MemoMeet
            </h1>
            <p class="text-muted small">AI-Powered Relationship & Meeting Intelligence</p>
        </div>
        
        <h4 class="mb-4 font-heading text-center">Sign In</h4>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@company.com" required autocomplete="username">
            </div>
            
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0">Password</label>
                    <a href="#" class="small text-decoration-none">Forgot?</a>
                </div>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2.5 mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
        
        <p class="text-center mt-3 mb-0 small text-secondary">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">Create free account</a>
        </p>
    </div>
</div>
{% endblock %}
